<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RestAdmin — Gestión de Pedidos</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f5f0ff;
      --bg2: #ede6ff;
      --surface: #ffffff;
      --card: #ffffff;
      --border: #ddd4f5;
      --purple: #7c4dbd;
      --purple-light: #9d6fd4;
      --purple-pale: #ede6ff;
      --purple-deep: #5b34a0;
      --accent: #c084fc;
      --red: #e05c7a;
      --green: #5cb88a;
      --text: #2d1f4e;
      --muted: #9585b8;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      background: #b47fe8;
      top: -100px; right: -100px;
    }
    body::after {
      width: 400px; height: 400px;
      background: #a78bfa;
      bottom: -100px; left: -80px;
    }

    /* ── AUTH ── */
    #auth-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    .auth-box {
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(124, 77, 189, 0.12);
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 36px;
    }

    .auth-logo .crown { font-size: 2.2rem; display: block; margin-bottom: 10px; }

    .auth-logo h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--purple);
      letter-spacing: 1px;
    }

    .auth-logo p {
      color: var(--muted);
      font-size: 0.82rem;
      margin-top: 5px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
    }

    .tabs {
      display: flex;
      background: var(--bg);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 26px;
      border: 1px solid var(--border);
    }

    .tab-btn {
      flex: 1; padding: 10px;
      border: none; background: transparent;
      color: var(--muted);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.88rem; cursor: pointer;
      border-radius: 9px; transition: all 0.2s;
    }

    .tab-btn.active {
      background: var(--purple);
      color: white; font-weight: 600;
    }

    .field { margin-bottom: 16px; }

    .field label {
      display: block; font-size: 0.78rem;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 8px; font-weight: 600;
    }

    .field input {
      width: 100%; background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px; padding: 12px 16px;
      color: #c4b8e0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.95rem; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(124,77,189,0.1);
      color: #c4b8e0;
    }

    .btn-primary {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--purple), var(--purple-light));
      color: white; border: none; border-radius: 12px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 8px; letter-spacing: 0.3px;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-primary:active { transform: scale(0.98); }

    .auth-msg {
      text-align: center; margin-top: 14px;
      font-size: 0.84rem; min-height: 20px;
    }
    .auth-msg.error   { color: var(--red); }
    .auth-msg.success { color: var(--green); }

    /* ── APP ── */
    #app-screen { display: none; min-height: 100vh; position: relative; z-index: 1; }

    header {
      background: white;
      border-bottom: 1.5px solid var(--border);
      padding: 0 32px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
      box-shadow: 0 2px 20px rgba(124,77,189,0.06);
    }

    .header-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem; font-weight: 700;
      color: var(--purple); letter-spacing: 0.5px;
    }
    .header-logo span { color: var(--accent); }

    .header-right { display: flex; align-items: center; gap: 14px; }

    .user-badge {
      font-size: 0.84rem; color: var(--muted);
      background: var(--purple-pale);
      padding: 6px 14px; border-radius: 20px;
    }
    .user-badge span { color: var(--purple); font-weight: 600; }

    .btn-logout {
      background: transparent;
      border: 1.5px solid var(--border); color: var(--muted);
      padding: 7px 16px; border-radius: 8px; font-size: 0.84rem;
      cursor: pointer; transition: all 0.2s;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    main { max-width: 860px; margin: 0 auto; padding: 40px 24px; }

    .page-header { margin-bottom: 32px; }

    .page-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem; font-weight: 700; color: var(--purple-deep);
    }
    .page-header p { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }

    .order-form {
      background: white; border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 28px; margin-bottom: 32px;
      box-shadow: 0 4px 20px rgba(124,77,189,0.06);
    }

    .order-form h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem; font-weight: 600; color: var(--purple);
      margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
    }

    .form-row {
      display: grid; grid-template-columns: 1fr 140px auto;
      gap: 12px; align-items: end;
    }
    .form-row .field { margin-bottom: 0; }

    .btn-add {
      padding: 12px 22px;
      background: linear-gradient(135deg, var(--purple), var(--purple-light));
      color: white; border: none; border-radius: 10px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 600; font-size: 0.88rem; cursor: pointer;
      transition: opacity 0.2s; white-space: nowrap;
    }
    .btn-add:hover { opacity: 0.88; }

    #toast {
      position: fixed; bottom: 28px; right: 28px;
      padding: 13px 22px; border-radius: 12px;
      font-size: 0.88rem; font-weight: 600;
      opacity: 0; transform: translateY(10px);
      transition: all 0.3s; z-index: 100; pointer-events: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.success { background: var(--green); color: white; }
    #toast.error   { background: var(--red);   color: white; }

    .list-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 14px;
    }

    .list-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem; font-weight: 600; color: var(--purple-deep);
    }

    .count-badge {
      background: var(--purple-pale); border: 1px solid var(--border);
      color: var(--purple); padding: 4px 14px;
      border-radius: 20px; font-size: 0.8rem; font-weight: 600;
    }

    #items-list { display: flex; flex-direction: column; gap: 10px; }

    .item-card {
      background: white; border: 1.5px solid var(--border);
      border-radius: var(--radius); padding: 18px 22px;
      display: flex; align-items: center; gap: 16px;
      animation: slideIn 0.22s ease;
      transition: border-color 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 10px rgba(124,77,189,0.04);
    }

    .item-card:hover {
      border-color: var(--purple-light);
      box-shadow: 0 4px 20px rgba(124,77,189,0.1);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item-num {
      width: 38px; height: 38px;
      background: var(--purple-pale); border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.78rem; color: var(--purple); font-weight: 700; flex-shrink: 0;
    }

    .item-info { flex: 1; min-width: 0; }

    .item-nombre {
      font-weight: 600; font-size: 0.96rem; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .item-cantidad { font-size: 0.8rem; color: var(--muted); margin-top: 3px; }
    .item-cantidad span { color: var(--purple); font-weight: 600; }

    .item-actions { display: flex; gap: 8px; flex-shrink: 0; }

    .item-card.editing {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(124,77,189,0.1);
      flex-wrap: wrap;
    }

    .edit-row {
      display: none; width: 100%; gap: 10px;
      margin-top: 12px; align-items: center;
    }
    .item-card.editing .edit-row { display: flex; }
    .item-card.editing .item-info { opacity: 0.35; }

    .edit-row input {
      flex: 1; background: var(--bg);
      border: 1.5px solid var(--border); border-radius: 9px;
      padding: 8px 12px; color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif; font-size: 0.9rem; outline: none;
    }
    .edit-row input:focus { border-color: var(--purple); }

    .btn-icon {
      width: 36px; height: 36px;
      border: 1.5px solid var(--border); background: white;
      border-radius: 9px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; font-size: 0.95rem;
    }
    .btn-edit:hover   { border-color: var(--purple); background: var(--purple-pale); }
    .btn-del:hover    { border-color: var(--red);    background: #fef0f3; }
    .btn-save:hover   { border-color: var(--green);  background: #f0faf5; }
    .btn-cancel:hover { border-color: var(--muted);  background: var(--bg); }

    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--muted);
      background: white; border-radius: var(--radius);
      border: 1.5px dashed var(--border);
    }
    .empty-state p { margin-top: 12px; font-size: 0.9rem; line-height: 1.6; }

    .loading { text-align: center; padding: 40px; color: var(--muted); }

    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr 1fr; }
      .form-row .btn-add { grid-column: span 2; }
      header { padding: 0 16px; }
      main { padding: 24px 16px; }
      .auth-box { padding: 36px 24px; }
    }
  </style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <span class="crown">🍽️</span>
      <h1>RestAdmin</h1>
      <p>Sistema de Pedidos</p>
    </div>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Iniciar sesión</button>
      <button class="tab-btn" onclick="switchTab('register')">Registrarse</button>
    </div>
    <div class="field">
      <label>Usuario</label>
      <input type="text" id="auth-username" placeholder="Tu usuario" />
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="auth-password" placeholder="••••••••" onkeydown="if(event.key==='Enter') submitAuth()" />
    </div>
    <button class="btn-primary" onclick="submitAuth()" id="auth-btn">Entrar</button>
    <p class="auth-msg" id="auth-msg"></p>
  </div>
</div>

<div id="app-screen">
  <header>
    <div class="header-logo">Rest<span>Admin</span></div>
    <div class="header-right">
      <div class="user-badge">Hola, <span id="username-display">—</span> 💜</div>
      <button class="btn-logout" onclick="logout()">Salir</button>
    </div>
  </header>

  <main>
    <div class="page-header">
      <h1>Gestión de Pedidos 🍴</h1>
      <p>Administrá los pedidos activos del restaurante</p>
    </div>

    <div class="order-form">
      <h2>✨ Nuevo pedido</h2>
      <div class="form-row">
        <div class="field">
          <label>Plato / Ítem</label>
          <input type="text" id="new-nombre" placeholder="Ej: Milanesa napolitana" />
        </div>
        <div class="field">
          <label>Cantidad</label>
          <input type="number" id="new-cantidad" placeholder="1" min="1" onkeydown="if(event.key==='Enter') addItem()" />
        </div>
        <button class="btn-add" onclick="addItem()">+ Agregar</button>
      </div>
    </div>

    <div class="list-header">
      <span class="list-title">Pedidos activos</span>
      <span class="count-badge" id="count-badge">0 pedidos</span>
    </div>

    <div id="items-list">
      <div class="loading">Cargando pedidos... 💜</div>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
  const API = 'https://trabajo-practico-m3.onrender.com';
  let token = localStorage.getItem('token') || null;
  let currentUser = localStorage.getItem('username') || null;
  let activeTab = 'login';

  if (token) showApp();

  function switchTab(tab) {
    activeTab = tab;
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
    document.getElementById('auth-btn').textContent = tab === 'login' ? 'Entrar' : 'Crear cuenta';
    setAuthMsg('', '');
  }

  async function submitAuth() {
    const username = document.getElementById('auth-username').value.trim();
    const password = document.getElementById('auth-password').value;
    if (!username || !password) return setAuthMsg('Completá todos los campos', 'error');

    const endpoint = activeTab === 'login' ? '/users/login' : '/users/register';
    try {
      const res = await fetch(API + endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) return setAuthMsg(data.message || 'Error', 'error');

      if (activeTab === 'register') {
        setAuthMsg('¡Cuenta creada! Iniciá sesión 🎉', 'success');
        switchTab('login');
      } else {
        token = data.token;
        currentUser = username;
        localStorage.setItem('token', token);
        localStorage.setItem('username', username);
        showApp();
      }
    } catch {
      setAuthMsg('No se pudo conectar con el servidor', 'error');
    }
  }

  function setAuthMsg(msg, type) {
    const el = document.getElementById('auth-msg');
    el.textContent = msg;
    el.className = 'auth-msg ' + type;
  }

  function showApp() {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    document.getElementById('username-display').textContent = currentUser;
    loadItems();
  }

  function logout() {
    token = null; currentUser = null;
    localStorage.removeItem('token');
    localStorage.removeItem('username');
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('auth-username').value = '';
    document.getElementById('auth-password').value = '';
  }

  async function loadItems() {
    const list = document.getElementById('items-list');
    list.innerHTML = '<div class="loading">Cargando pedidos... 💜</div>';
    try {
      const res = await fetch(API + '/items', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (res.status === 401) return logout();
      const data = await res.json();
      renderItems(data);
    } catch {
      list.innerHTML = '<div class="loading">Error al cargar pedidos</div>';
    }
  }

  function renderItems(items) {
    const badge = document.getElementById('count-badge');
    badge.textContent = items.length + (items.length === 1 ? ' pedido' : ' pedidos');

    if (!items.length) {
      document.getElementById('items-list').innerHTML = `
        <div class="empty-state">
          <div style="font-size:2.8rem">🍽️</div>
          <p>No hay pedidos todavía.<br>¡Agregá el primero arriba!</p>
        </div>`;
      return;
    }

    document.getElementById('items-list').innerHTML = items.map((item, i) => `
      <div class="item-card" id="card-${item.id}">
        <div class="item-num">#${i+1}</div>
        <div class="item-info">
          <div class="item-nombre">${escHtml(item.nombre)}</div>
          <div class="item-cantidad">Cantidad: <span>${item.cantidad}</span></div>
        </div>
        <div class="item-actions">
          <button class="btn-icon btn-edit" onclick="startEdit(${item.id})" title="Editar">✏️</button>
          <button class="btn-icon btn-del"  onclick="deleteItem(${item.id})" title="Eliminar">🗑️</button>
        </div>
        <div class="edit-row">
          <input id="edit-nombre-${item.id}"   value="${escHtml(item.nombre)}" placeholder="Nombre" />
          <input id="edit-cantidad-${item.id}" value="${item.cantidad}" type="number" min="1" style="max-width:90px" />
          <button class="btn-icon btn-save"   onclick="saveEdit(${item.id})" title="Guardar">✅</button>
          <button class="btn-icon btn-cancel" onclick="cancelEdit(${item.id})" title="Cancelar">✖️</button>
        </div>
      </div>
    `).join('');
  }

  async function addItem() {
    const nombre   = document.getElementById('new-nombre').value.trim();
    const cantidad = document.getElementById('new-cantidad').value;
    if (!nombre || !cantidad) return showToast('Completá nombre y cantidad', 'error');

    try {
      const res = await fetch(API + '/items', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ nombre, cantidad: Number(cantidad) })
      });
      const data = await res.json();
      if (!res.ok) return showToast(data.message || 'Error', 'error');
      document.getElementById('new-nombre').value = '';
      document.getElementById('new-cantidad').value = '';
      showToast('Pedido agregado ✨', 'success');
      loadItems();
    } catch { showToast('Error al agregar pedido', 'error'); }
  }

  async function deleteItem(id) {
    try {
      const res = await fetch(API + '/items/' + id, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (!res.ok) return showToast('Error al eliminar', 'error');
      showToast('Pedido eliminado 🗑️', 'success');
      loadItems();
    } catch { showToast('Error al eliminar', 'error'); }
  }

  function startEdit(id)  { document.getElementById('card-' + id).classList.add('editing'); }
  function cancelEdit(id) { document.getElementById('card-' + id).classList.remove('editing'); }

  async function saveEdit(id) {
    const nombre   = document.getElementById('edit-nombre-'   + id).value.trim();
    const cantidad = document.getElementById('edit-cantidad-' + id).value;
    if (!nombre || !cantidad) return showToast('Completá todos los campos', 'error');

    try {
      const res = await fetch(API + '/items/' + id, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ nombre, cantidad: Number(cantidad) })
      });
      if (!res.ok) return showToast('Error al actualizar', 'error');
      showToast('Pedido actualizado 💜', 'success');
      loadItems();
    } catch { showToast('Error al actualizar', 'error'); }
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let toastTimer;
  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.className = '', 3000);
  }
</script>
</body>
</html>
